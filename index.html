<!DOCTYPE html>
<html lang="it">
<head>

    <title>4kvisione - Portfolio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        header {
            padding: 40px 20px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            letter-spacing: 1px;
        }
        h1 a {
            color: #000000;
            text-transform: lowercase;
            text-decoration: none;
            display: inline-block;
        }
        h1 a:visited, h1 a:hover, h1 a:active {
            color: #000000;
            text-decoration: none;
        }
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .grid-container {
            column-count: 3;
            column-gap: 20px;
        }
        .grid-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 2px;
            cursor: pointer;
            break-inside: avoid;
            background-color: #f7f7f7;
        }
        .grid-item img, .grid-item video {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }
        .grid-item img:hover, .grid-item video:hover {
            opacity: 0.85;
        }

        /* Nasconde i file vuoti locali */
        .grid-item img:not([src]), .grid-item img[src=""], .grid-item img:invalid,
        .grid-item video:not([src]), .grid-item video[src=""] {
            display: none !important;
        }
        
        /* Schermata Schermo Intero (Lightbox) */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
        }
        .lightbox-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1001;
        }
        .lightbox-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 80px 40px 80px;
            box-sizing: border-box;
            position: relative;
        }
        .lightbox-content img, .lightbox-content video {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            user-select: none;
            box-shadow: 0px 4px 30px rgba(0, 0, 0, 0.05);
            z-index: 1002;
            position: relative;
            background: #ffffff;
        }

        /* Pulsanti di navigazione */
        .nav-btn {
            position: absolute;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            z-index: 1003;
        }
        .nav-btn:hover { opacity: 0.5; }
        .nav-btn svg {
            width: 24px;
            height: 24px;
            stroke: #000000;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .close-btn { top: 35px; left: 35px; }
        .prev-btn { left: 35px; top: 50%; transform: translateY(-50%); display: none; }
        .next-btn { right: 35px; top: 50%; transform: translateY(-50%); display: none; }

        @media (max-width: 900px) {
            .grid-container { column-count: 2; column-gap: 15px; }
            .grid-item { margin-bottom: 15px; }
        }
        @media (max-width: 600px) {
            .grid-container { column-count: 1; column-gap: 10px; }
            .grid-item { margin-bottom: 10px; }
            header { padding: 20px 15px 10px 15px; }
            main { padding: 15px; }
            .close-btn { top: 20px; left: 20px; }
            .prev-btn { left: 15px; }
            .next-btn { right: 15px; }
            .lightbox-content { padding: 80px 20px 20px 20px; }
        }
    </style>
</head>

    <div id="lightbox" class="lightbox">
        <div class="lightbox-overlay" onclick="forceCloseLightbox()"></div>
        <div class="lightbox-content">
            <button class="nav-btn close-btn" onclick="forceCloseLightbox()" aria-label="Chiudi">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <button class="nav-btn prev-btn" id="prev-button" aria-label="Precedente">
                <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button class="nav-btn next-btn" id="next-button" aria-label="Successiva">
                <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            
            <div id="lightbox-target" style="width:100%; height:100%; display:flex; justify-content:center; align-items:center;"></div>
        </div>
    </div>

    <script>
        var lightbox = document.getElementById('lightbox');
        var lightboxTarget = document.getElementById('lightbox-target');
        var prevBtn = document.getElementById('prev-button');
        var nextBtn = document.getElementById('next-button');
        
        var currentGroupItems = [];
        var currentIndex = 0;

        function openLightbox(element, type) {
            if (!lightbox || !lightboxTarget) return;
            
            var groupName = element.getAttribute('data-group');
            
            if (groupName) {
                currentGroupItems = Array.from(document.querySelectorAll('.grid-item[data-group="' + groupName + '"]')).filter(el => el.style.display !== 'none');
                currentIndex = currentGroupItems.indexOf(element);
                
                if (currentGroupItems.length > 1) {
                    prevBtn.style.display = 'flex';
                    nextBtn.style.display = 'flex';
                } else {
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                }
            } else {
                currentGroupItems = [element];
                currentIndex = 0;
                prevBtn.style.display = 'none';
                nextBtn.style.display = 'none';
            }

            renderMedia();
            lightbox.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function renderMedia() {
            lightboxTarget.innerHTML = '';
            var activeElement = currentGroupItems[currentIndex];
            if (!activeElement) return;

            var videoSource = activeElement.querySelector('video');
            var imageSource = activeElement.querySelector('img');

            if (videoSource) {
                var videoEl = document.createElement('video');
                videoEl.src = videoSource.getAttribute('src');
                videoEl.controls = true;
                videoEl.autoplay = true;
                lightboxTarget.appendChild(videoEl);
            } else if (imageSource) {
                var imgEl = document.createElement('img');
                imgEl.src = imageSource.getAttribute('src');
                lightboxTarget.appendChild(imgEl);
            }
        }

        function navigateLightbox(direction) {
            if (currentGroupItems.length <= 1) return;
            
            if (direction === 'next') {
                currentIndex = (currentIndex + 1) % currentGroupItems.length;
            } else if (direction === 'prev') {
                currentIndex = (currentIndex - 1 + currentGroupItems.length) % currentGroupItems.length;
            }
            renderMedia();
        }

        function forceCloseLightbox() {
            if (lightbox && lightboxTarget) {
                lightbox.style.display = 'none';
                lightboxTarget.innerHTML = '';
                document.body.style.overflow = 'auto';
            }
        }

        prevBtn.addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox('prev'); });
        nextBtn.addEventListener('click', function(e) { e.stopPropagation(); navigateLightbox('next'); });

        document.addEventListener('keydown', function(event) {
            if (lightbox.style.display === 'block') {
                if (event.key === 'Escape') forceCloseLightbox();
                if (event.key === 'ArrowRight') navigateLightbox('next');
                if (event.key === 'ArrowLeft') navigateLightbox('prev');
            }
        });

        // Nasconde dinamicamente gli elementi multimediali non trovati localmente
        document.querySelectorAll('.grid-item img').forEach(img => {
            img.onerror = function() { this.closest('.grid-item').style.display = 'none'; };
        });
        document.querySelectorAll('.grid-item video').forEach(vid => {
            vid.onerror = function() { this.closest('.grid-item').style.display = 'none'; };
        });
    </script>
